<!DOCTYPE html>
<html>

<head>

    <title>Karnival POLYCC Registration</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>

    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

    <!-- External JS -->
    <script src="script.js"></script>

</head>

<body>

    <div data-role="page">

        <div data-role="header">
            <h2>Karnival POLYCC Mega 2026</h2>
        </div>

        <div data-role="main" class="ui-content">

            <form>

                <label for="name">Name</label>
                <input type="text" id="name">

                <label for="email">Email</label>
                <input type="email" id="email">

                <label for="age">Age (Compulsory)</label>
                <input type="number" id="age" required>

                <label for="gender">Gender</label>
                <select id="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone">

                <button type="button" id="submitBtn">Register</button>

            </form>

        </div>

        <div data-role="popup" id="popupMsg" class="ui-content">
            <p id="message"></p>
            <a href="#" data-rel="back" class="ui-btn ui-btn-b">Close</a>
        </div>

    </div>

</body>

</html>
